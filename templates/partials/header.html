<!-- パスとファイル名: templates/html/partials/header.html -->
<!-- Path and filename: templates/html/partials/header.html -->
    <header class="site-header">
        <div class="site-header__main">
            <h1 class="site-header__title"><a href="/" class="site-header__link">{{ site_name }} No magic. Just code.()</a></h1>

        {% if current_user %}
                <p class="site-header__login-status">ログイン中：{{ current_user.display_name or current_user.username }}</p>
        {% endif %}
        </div>

        <div class="site-header__sub">
            <nav class="global-nav">
                <ul class="global-nav__list">
                    <li class="global-nav__item"><a href="/post" class="link global-nav__link">Post</a></li>
                    {% if current_user %}
                    <li class="global-nav__item"><a href="/admin" class="link global-nav__link">Admin</a></li>
                    <li class="global-nav__item"><a href="/auth/logout" class="link global-nav__link">Logout</a></li>
                    {% else %}
                    <li class="global-nav__item"><a href="/auth/login" class="link global-nav__link">Login</a></li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>
